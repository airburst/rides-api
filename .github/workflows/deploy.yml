name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: # Allow manual triggers

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    # Only run if CI workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts

      - name: Copy built files to VPS
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_PATH }}/dist/

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -o ServerAliveInterval=60 -o ServerAliveCountMax=10 $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -e
            echo "🚀 Starting deployment..."
            cd ${{ secrets.VPS_APP_PATH }}

            # Pull latest code (for config/schema updates)
            echo "📥 Pulling latest code..."
            git pull origin main

            # Run database migrations
            echo "🗄️  Running database migrations..."
            /home/ubuntu/.bun/bin/bun run db:migrate

            # Reload PM2 (graceful restart)
            echo "♻️  Reloading application..."
            pm2 reload rides-api --update-env

            # Verify deployment
            echo "✅ Verifying deployment..."
            sleep 2
            pm2 describe rides-api | grep status

            echo "🎉 Deployment complete!"
          ENDSSH

      - name: Health Check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          sleep 5
          curl -f http://$VPS_HOST:3001/health || exit 1
          echo "✅ Health check passed!"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
