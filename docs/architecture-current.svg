<svg width="900" height="580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <clipPath id="vmClip">
      <rect x="380" y="145" width="470" height="270" rx="10"/>
    </clipPath>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arrO" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
    <marker id="arrB" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">ClubRides.app — Current Architecture (Dual-Auth)</text>

  <!-- Client / Browser -->
  <rect x="370" y="30" width="160" height="58" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="54" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Browser / Client</text>
  <text x="450" y="72" text-anchor="middle" font-size="11" fill="#64748b">clubrides.app</text>

  <!-- Arrow: Client → Vercel -->
  <line x1="410" y1="88" x2="200" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="280" y="105" font-size="10" fill="#64748b">HTTPS (CDN)</text>

  <!-- Arrow: Client → Oracle Cloud (API) -->
  <line x1="490" y1="88" x2="615" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="520" y="105" font-size="10" fill="#64748b">HTTPS · api.clubrides.app</text>

  <!-- Vercel Frontend -->
  <rect x="42" y="145" width="316" height="120" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="200" y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">Vercel CDN</text>
  <text x="200" y="182" text-anchor="middle" font-size="10" fill="#4b5563">Next.js SPA</text>
  <text x="200" y="196" text-anchor="middle" font-size="10" fill="#4b5563">TanStack Query</text>
  <text x="200" y="210" text-anchor="middle" font-size="10" fill="#4b5563">Auth0 SPA SDK</text>
  <text x="200" y="224" text-anchor="middle" font-size="10" fill="#4b5563">Global CDN regions</text>
  <text x="200" y="254" text-anchor="middle" font-size="10" fill="#94a3b8">Frontend · Static assets</text>

  <!-- Arrow: Vercel → Oracle Cloud API -->
  <line x1="358" y1="195" x2="380" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Oracle Cloud VM outer box -->
  <rect x="380" y="145" width="470" height="270" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <!-- Header band (clipped to box rounded corners) -->
  <rect x="380" y="145" width="470" height="32" clip-path="url(#vmClip)" fill="#fb923c"/>
  <!-- VM header text -->
  <text x="398" y="165" font-size="11" font-weight="700" fill="white">ORACLE CLOUD VM  —  Always Free</text>
  <text x="560" y="165" font-size="9" fill="#ffedd5">UK South (London)  ·  1 OCPU  ·  1 GB RAM</text>

  <!-- Caddy box -->
  <rect x="398" y="190" width="120" height="75" rx="7" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="458" y="209" text-anchor="middle" font-size="12" font-weight="600" fill="#c2410c">Caddy</text>
  <text x="458" y="225" text-anchor="middle" font-size="9" fill="#9a3412">Reverse proxy · :443</text>
  <text x="458" y="237" text-anchor="middle" font-size="9" fill="#9a3412">TLS term</text>
  <text x="458" y="248" text-anchor="middle" font-size="9" fill="#9a3412">Let's Encrypt</text>

  <!-- Arrow: Caddy → Hono -->
  <line x1="518" y1="227" x2="568" y2="227" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrO)"/>

  <!-- Hono API box -->
  <rect x="572" y="190" width="130" height="75" rx="7" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="637" y="209" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Hono API</text>
  <text x="637" y="225" text-anchor="middle" font-size="9" fill="#713f12">Bun · :3001</text>
  <text x="637" y="237" text-anchor="middle" font-size="9" fill="#713f12">Rate limit</text>
  <text x="637" y="248" text-anchor="middle" font-size="9" fill="#713f12">JWT verify</text>

  <!-- Bidirectional arrows: Hono ↔ Redis -->
  <line x1="702" y1="221" x2="746" y2="221" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="746" y1="233" x2="702" y2="233" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Redis box -->
  <rect x="750" y="190" width="82" height="75" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="791" y="209" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Redis</text>
  <text x="791" y="225" text-anchor="middle" font-size="9" fill="#166534">Cache</text>
  <text x="791" y="237" text-anchor="middle" font-size="9" fill="#166534">Club-</text>
  <text x="791" y="248" text-anchor="middle" font-size="9" fill="#166534">scoped</text>

  <!-- PM2 bar -->
  <rect x="398" y="280" width="434" height="30" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="615" y="300" text-anchor="middle" font-size="10" font-weight="500" fill="#475569">PM2  —  auto-restart · log rotation</text>

  <!-- Dual-auth note -->
  <rect x="398" y="320" width="434" height="80" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="615" y="337" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">Dual-Auth During Migration</text>
  <text x="615" y="352" text-anchor="middle" font-size="9" fill="#5b21b6">Primary: better-auth (HttpOnly cookies)</text>
  <text x="615" y="364" text-anchor="middle" font-size="9" fill="#5b21b6">Legacy: Auth0 (JWT Bearer token)</text>
  <text x="615" y="376" text-anchor="middle" font-size="9" fill="#5b21b6">No collision — different headers</text>
  <text x="615" y="388" text-anchor="middle" font-size="9" fill="#5b21b6">Sessions table · email+password</text>

  <!-- Arrows: VM → External services (VM bottom y = 145+270 = 415) -->
  <!-- Arrow: Hono → Auth0 JWKS -->
  <line x1="560" y1="415" x2="140" y2="450" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrB)"/>
  <text x="320" y="430" font-size="9" fill="#0ea5e9" font-style="italic">JWT verification (legacy)</text>

  <!-- Arrow: VM → Supabase -->
  <line x1="615" y1="415" x2="485" y2="450" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="520" y="432" font-size="9" fill="#64748b">SQL / TLS</text>

  <!-- Arrow: VM → Resend -->
  <line x1="670" y1="415" x2="670" y2="450" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="678" y="432" font-size="9" fill="#64748b">HTTPS API</text>

  <!-- Auth0 box -->
  <rect x="30" y="454" width="220" height="100" rx="8" fill="white" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="140" y="477" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Auth0</text>
  <text x="140" y="494" text-anchor="middle" font-size="10" fill="#64748b">Legacy IdP · JWKS</text>
  <text x="140" y="509" text-anchor="middle" font-size="10" fill="#64748b">JWT token verification</text>
  <text x="140" y="524" text-anchor="middle" font-size="9" fill="#94a3b8">Being deprecated</text>
  <text x="140" y="540" text-anchor="middle" font-size="9" fill="#94a3b8">post-migration cutover</text>

  <!-- Supabase box -->
  <rect x="310" y="454" width="220" height="100" rx="8" fill="white" stroke="#3ecf8e" stroke-width="1.5"/>
  <text x="420" y="477" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Supabase</text>
  <text x="420" y="494" text-anchor="middle" font-size="10" fill="#64748b">PostgreSQL (DB-only)</text>
  <text x="420" y="509" text-anchor="middle" font-size="10" fill="#64748b">EU region · PgBouncer</text>
  <text x="420" y="524" text-anchor="middle" font-size="9" fill="#94a3b8">Free → $25/mo Pro</text>
  <text x="420" y="540" text-anchor="middle" font-size="9" fill="#94a3b8">Row-level security (RLS)</text>

  <!-- Resend box -->
  <rect x="590" y="454" width="220" height="100" rx="8" fill="white" stroke="#6366f1" stroke-width="1.5"/>
  <text x="700" y="477" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Resend</text>
  <text x="700" y="494" text-anchor="middle" font-size="10" fill="#64748b">Transactional email</text>
  <text x="700" y="509" text-anchor="middle" font-size="10" fill="#64748b">Verify · password reset</text>
  <text x="700" y="524" text-anchor="middle" font-size="9" fill="#94a3b8">Free (3K/mo) → $20/mo</text>
  <text x="700" y="540" text-anchor="middle" font-size="9" fill="#94a3b8">DKIM/SPF verified domain</text>
</svg>
